version: "3.9"

services:
  bookingservice:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookingservice
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    environment:
      APP_ENV: prod
      PORT: 3000

      # Kafka
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_EVENTS: events.raw

      # MySQL
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: justtrack
      MYSQL_USER: justtrack
      MYSQL_PASSWORD: justtrack

      # Redis
      REDIS_ADDR: redis:6379

      # DynamoDB
      DYNAMODB_ENDPOINT: http://dynamodb:8000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy

    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  mysql:
    image: mysql:8.4.5
    container_name: jt-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bookingservice
      MYSQL_USER: justtrack
      MYSQL_PASSWORD: justtrack
    ports:
      - "3306:3306"
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  redis:
    image: redis:8.0-alpine
    container_name: jt-redis
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:3.9.1
    container_name: jt-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft mode
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Single-node setup
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # Stable cluster id
      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: jt-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: jt-redis-commander
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis

  reporter:
    image: ghcr.io/justtrackio/backendtest-reporter:latest
    container_name: jt-reporter
    depends_on:
      bookingservice:
        condition: service_healthy
    environment:
      API_BASE_URL: http://bookingservice:3000
      KAFKA_BROKER: kafka:9092

volumes:
  mysql_data:
